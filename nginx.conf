server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # index.html：永不快取（瀏覽器 + Cloudflare Edge 雙重 bypass）
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header CDN-Cache-Control "no-store" always;
        add_header Cloudflare-CDN-Cache-Control "no-store" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    # SPA fallback（/ 也套用 no-cache，與 index.html 一致）
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header CDN-Cache-Control "no-store" always;
        add_header Cloudflare-CDN-Cache-Control "no-store" always;
    }

    # 帶 content-hash 的靜態資源（JS/CSS）：強快取 1 年
    # Vite build 產生的 hash 確保內容變動時 URL 必然不同
    location ~* \.(js|css|woff2?|ttf|eot)$ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # 圖片資源：快取 7 天
    location ~* \.(png|jpg|jpeg|gif|ico|svg|webp)$ {
        add_header Cache-Control "public, max-age=604800" always;
    }
}
