services:
  alphaweb:
    build: .
    container_name: alphaweb-1001
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 60s
      timeout: 5s
      retries: 1
      start_period: 60s
    ports:
      - "127.0.0.1:5173:80"
    networks:
      - VPS-net

networks:
  VPS-net:
    external: true
